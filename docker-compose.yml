version: '3.8'

services:
  app:
    build: .
    container_name: yii2_app
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - loan_network
    command: >
      sh -c "mkdir -p runtime/logs && 
             touch runtime/logs/app.log && 
             chmod -R 777 runtime/logs && 
             php-fpm"

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: loans
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loan_network

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - loan_network

networks:
  loan_network:
    driver: bridge

volumes:
  postgres_data:
